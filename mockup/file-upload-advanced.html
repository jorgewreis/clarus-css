<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup - Upload avançado</title>

    <!-- STYLES IMPORT -->
    <link rel="stylesheet" href="../dist/css/fonts.css">
    <link rel="stylesheet" href="../dist/css/forms.css">
    <link rel="stylesheet" href="../dist/css/components.css">
    <link rel="stylesheet" href="../dist/css/helpers.css">
    <style>
        .theme-panel {
            padding: 24px;
        }

        [data-theme="dark"].theme-panel {
            color: var(--cl-color-text);
            background-color: var(--cl-color-surface);
        }

        .upload-demo {
            max-width: 360px;
        }
    </style>
</head>
<body>

    <div class="theme-panel">
        <h2 class="u-fs-lg u-fw-medium">Claro</h2>

        <div class="cl-file-upload upload-demo" data-cl="file-upload-advanced" id="upload-claro">
            <input type="file" class="cl-file-input" id="anexos-claro" multiple>
            <label for="anexos-claro" class="cl-file-label cl-file-label-dropzone" data-cl="file-drop">
                Arraste arquivos ou clique para escolher
                <span class="cl-file-dropzone-hint">Vários arquivos, até 5MB cada</span>
            </label>
        </div>
        <button type="button" class="cl-btn u-mt-2" data-simulate="upload-claro">Simular progresso do 1º arquivo</button>
    </div>

    <div class="theme-panel" data-theme="dark">
        <h2 class="u-fs-lg u-fw-medium">Escuro</h2>

        <div class="cl-file-upload upload-demo" data-cl="file-upload-advanced" id="upload-escuro">
            <input type="file" class="cl-file-input" id="anexos-escuro" multiple>
            <label for="anexos-escuro" class="cl-file-label cl-file-label-dropzone" data-cl="file-drop">
                Arraste arquivos ou clique para escolher
                <span class="cl-file-dropzone-hint">Vários arquivos, até 5MB cada</span>
            </label>
        </div>
        <button type="button" class="cl-btn u-mt-2" data-simulate="upload-escuro">Simular progresso do 1º arquivo</button>
    </div>

    <script src="../dist/js/clarus.js"></script>
    <script>
        // Demonstra a API `setProgress`/`setError` sem depender de um backend
        // real — um `setInterval` simula um upload progressivo no 1º arquivo
        // selecionado, só pra exercitar a barra de progresso do mockup.
        document.querySelectorAll("[data-simulate]").forEach((button) => {
            button.addEventListener("click", () => {
                const rootEl = document.getElementById(button.getAttribute("data-simulate"));
                const upload = Clarus.FileUploadAdvanced.getInstance(rootEl);
                const firstItem = rootEl.querySelector(".cl-file-upload-item");
                if (!firstItem) return;

                const id = firstItem.getAttribute("data-file-id");
                let progress = 0;
                const interval = setInterval(() => {
                    progress += 20;
                    upload.setProgress(id, progress);
                    if (progress >= 100) clearInterval(interval);
                }, 200);
            });
        });
    </script>
</body>
</html>
