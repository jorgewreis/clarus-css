<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup - Tag / Badge Dismissível</title>

    <!-- STYLES IMPORT -->
    <link rel="stylesheet" href="../dist/css/fonts.css">
    <link rel="stylesheet" href="../dist/css/components.css">
    <link rel="stylesheet" href="../dist/css/helpers.css">
    <style>
        .theme-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 24px;
            background-color: var(--clarus-color-subtle);
        }

        [data-theme="dark"].theme-panel {
            color: var(--clarus-color-text);
            background-color: var(--clarus-color-surface);
        }

        .tag-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
    </style>
</head>
<body>

    <h2 class="fs-lg fw-medium" style="padding: 24px 24px 0;">Claro</h2>
    <div class="theme-panel">
        <p class="fs-sm fw-medium mb-0">Tags removíveis (clique no "x")</p>
        <div class="tag-row" id="tags-claro">
            <span class="badge tag" data-clarus="tag">
                Frontend
                <button type="button" class="btn-close" data-dismiss="tag" aria-label="Remover tag Frontend"></button>
            </span>
            <span class="badge badge-primary tag" data-clarus="tag">
                Urgente
                <button type="button" class="btn-close" data-dismiss="tag" aria-label="Remover tag Urgente"></button>
            </span>
            <span class="badge badge-success tag" data-clarus="tag">
                Aprovado
                <button type="button" class="btn-close" data-dismiss="tag" aria-label="Remover tag Aprovado"></button>
            </span>
            <span class="badge badge-danger tag" data-clarus="tag">
                Bloqueado
                <button type="button" class="btn-close" data-dismiss="tag" aria-label="Remover tag Bloqueado"></button>
            </span>
        </div>

        <p class="fs-sm fw-medium mb-0">Tamanhos (sm / padrão / lg)</p>
        <div class="tag-row">
            <span class="badge badge-info tag badge-sm" data-clarus="tag">
                sm
                <button type="button" class="btn-close" data-dismiss="tag" aria-label="Remover"></button>
            </span>
            <span class="badge badge-info tag" data-clarus="tag">
                padrão
                <button type="button" class="btn-close" data-dismiss="tag" aria-label="Remover"></button>
            </span>
            <span class="badge badge-info tag badge-lg" data-clarus="tag">
                lg
                <button type="button" class="btn-close" data-dismiss="tag" aria-label="Remover"></button>
            </span>
        </div>

        <p class="fs-sm fw-medium mb-0">Cancelando a remoção (clarus:tag:dismissed + preventDefault)</p>
        <div class="tag-row">
            <span class="badge badge-warning tag" id="tag-protegida" data-clarus="tag">
                Protegida
                <button type="button" class="btn-close" data-dismiss="tag" aria-label="Remover tag Protegida"></button>
            </span>
        </div>
    </div>

    <h2 class="fs-lg fw-medium" data-theme="dark" style="padding: 24px 24px 0; background-color: var(--clarus-color-surface); color: var(--clarus-color-text); margin: 0;">Escuro</h2>
    <div class="theme-panel" data-theme="dark">
        <div class="tag-row">
            <span class="badge tag" data-clarus="tag">
                Frontend
                <button type="button" class="btn-close" data-dismiss="tag" aria-label="Remover tag Frontend"></button>
            </span>
            <span class="badge badge-primary tag" data-clarus="tag">
                Urgente
                <button type="button" class="btn-close" data-dismiss="tag" aria-label="Remover tag Urgente"></button>
            </span>
        </div>
    </div>

    <script src="../dist/js/clarus.js"></script>
    <script>
        document.getElementById("tag-protegida").addEventListener("clarus:tag:dismissed", (event) => {
            event.preventDefault();
            alert("Essa tag não pode ser removida.");
        });
    </script>
</body>
</html>
