<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup - Tag / Badge Dismissível</title>

    <!-- STYLES IMPORT -->
    <link rel="stylesheet" href="../dist/css/fonts.css">
    <link rel="stylesheet" href="../dist/css/components.css">
    <link rel="stylesheet" href="../dist/css/helpers.css">
    <style>
        .theme-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 24px;
            background-color: var(--cl-color-subtle);
        }

        [data-theme="dark"].theme-panel {
            color: var(--cl-color-text);
            background-color: var(--cl-color-surface);
        }

        .tag-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
    </style>
</head>
<body>

    <h2 class="u-fs-lg u-fw-medium" style="padding: 24px 24px 0;">Claro</h2>
    <div class="theme-panel">
        <p class="u-fs-sm u-fw-medium u-mb-0">Tags removíveis (clique no "x")</p>
        <div class="tag-row" id="tags-claro">
            <span class="cl-badge cl-tag" data-cl="tag">
                Frontend
                <button type="button" class="cl-btn-close" data-cl-dismiss="tag" aria-label="Remover tag Frontend"></button>
            </span>
            <span class="cl-badge cl-badge-primary cl-tag" data-cl="tag">
                Urgente
                <button type="button" class="cl-btn-close" data-cl-dismiss="tag" aria-label="Remover tag Urgente"></button>
            </span>
            <span class="cl-badge cl-badge-success cl-tag" data-cl="tag">
                Aprovado
                <button type="button" class="cl-btn-close" data-cl-dismiss="tag" aria-label="Remover tag Aprovado"></button>
            </span>
            <span class="cl-badge cl-badge-danger cl-tag" data-cl="tag">
                Bloqueado
                <button type="button" class="cl-btn-close" data-cl-dismiss="tag" aria-label="Remover tag Bloqueado"></button>
            </span>
        </div>

        <p class="u-fs-sm u-fw-medium u-mb-0">Tamanhos (xs / sm / padrão / lg / xl)</p>
        <div class="cl-tag-group">
            <span class="cl-badge cl-badge-info cl-tag cl-tag-xs" data-cl="tag">
                xs
                <button type="button" class="cl-btn-close" data-cl-dismiss="tag" aria-label="Remover"></button>
            </span>
            <span class="cl-badge cl-badge-info cl-tag cl-tag-sm" data-cl="tag">
                sm
                <button type="button" class="cl-btn-close" data-cl-dismiss="tag" aria-label="Remover"></button>
            </span>
            <span class="cl-badge cl-badge-info cl-tag" data-cl="tag">
                padrão
                <button type="button" class="cl-btn-close" data-cl-dismiss="tag" aria-label="Remover"></button>
            </span>
            <span class="cl-badge cl-badge-info cl-tag cl-tag-lg" data-cl="tag">
                lg
                <button type="button" class="cl-btn-close" data-cl-dismiss="tag" aria-label="Remover"></button>
            </span>
            <span class="cl-badge cl-badge-info cl-tag cl-tag-xl" data-cl="tag">
                xl
                <button type="button" class="cl-btn-close" data-cl-dismiss="tag" aria-label="Remover"></button>
            </span>
        </div>

        <p class="u-fs-sm u-fw-medium u-mt-3 u-mb-0">Agrupamento (.cl-tag-group)</p>
        <div class="cl-tag-group">
            <span class="cl-badge cl-tag" data-cl="tag">Design<button type="button" class="cl-btn-close" data-cl-dismiss="tag" aria-label="Remover"></button></span>
            <span class="cl-badge cl-tag" data-cl="tag">Frontend<button type="button" class="cl-btn-close" data-cl-dismiss="tag" aria-label="Remover"></button></span>
            <span class="cl-badge cl-tag" data-cl="tag">Backend<button type="button" class="cl-btn-close" data-cl-dismiss="tag" aria-label="Remover"></button></span>
            <span class="cl-badge cl-tag" data-cl="tag">DevOps<button type="button" class="cl-btn-close" data-cl-dismiss="tag" aria-label="Remover"></button></span>
            <span class="cl-badge cl-tag" data-cl="tag">QA<button type="button" class="cl-btn-close" data-cl-dismiss="tag" aria-label="Remover"></button></span>
        </div>

        <p class="u-fs-sm u-fw-medium u-mb-0">Cancelando a remoção (cl:tag:dismissed + preventDefault)</p>
        <div class="tag-row">
            <span class="cl-badge cl-badge-warning cl-tag" id="tag-protegida" data-cl="tag">
                Protegida
                <button type="button" class="cl-btn-close" data-cl-dismiss="tag" aria-label="Remover tag Protegida"></button>
            </span>
        </div>
    </div>

    <h2 class="u-fs-lg u-fw-medium" data-theme="dark" style="padding: 24px 24px 0; background-color: var(--cl-color-surface); color: var(--cl-color-text); margin: 0;">Escuro</h2>
    <div class="theme-panel" data-theme="dark">
        <div class="tag-row">
            <span class="cl-badge cl-tag" data-cl="tag">
                Frontend
                <button type="button" class="cl-btn-close" data-cl-dismiss="tag" aria-label="Remover tag Frontend"></button>
            </span>
            <span class="cl-badge cl-badge-primary cl-tag" data-cl="tag">
                Urgente
                <button type="button" class="cl-btn-close" data-cl-dismiss="tag" aria-label="Remover tag Urgente"></button>
            </span>
        </div>
    </div>

    <script src="../dist/js/clarus.js"></script>
    <script>
        document.getElementById("tag-protegida").addEventListener("cl:tag:dismissed", (event) => {
            event.preventDefault();
            alert("Essa tag não pode ser removida.");
        });
    </script>
</body>
</html>
