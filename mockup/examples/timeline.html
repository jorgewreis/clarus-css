<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup - Timeline</title>

    <!-- STYLES IMPORT -->
    <link rel="stylesheet" href="../../dist/css/fonts.css">
    <link rel="stylesheet" href="../../dist/css/components.css">
    <link rel="stylesheet" href="../../dist/css/helpers.css">
    <style>
        .theme-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 32px;
            padding: 24px;
            background-color: var(--cl-color-subtle);
        }

        html[data-theme="dark"] .theme-panel {
            color: var(--cl-color-text);
            background-color: var(--cl-color-surface);
        }

        .timeline-col {
            width: 280px;
        }
    </style>
    <link rel="stylesheet" href="../assets/example-theme.css">
    <script src="../assets/example-theme.js"></script>
</head>
<body>
<div class="theme-panel">
        <div class="timeline-col">
            <p class="u-fs-sm u-fw-medium u-mb-2">Vertical</p>
            <ul class="cl-timeline">
                <li class="cl-timeline-item cl-timeline-completed">
                    <div class="cl-timeline-marker"></div>
                    <div class="cl-timeline-content">
                        <p class="cl-timeline-title">Pedido recebido</p>
                        <span class="cl-timeline-time">09:12</span>
                    </div>
                </li>
                <li class="cl-timeline-item cl-timeline-completed">
                    <div class="cl-timeline-marker"></div>
                    <div class="cl-timeline-content">
                        <p class="cl-timeline-title">Pagamento confirmado</p>
                        <span class="cl-timeline-time">09:15</span>
                    </div>
                </li>
                <li class="cl-timeline-item cl-timeline-active">
                    <div class="cl-timeline-marker"></div>
                    <div class="cl-timeline-content">
                        <p class="cl-timeline-title">Em separação</p>
                        <p class="cl-timeline-text">Aguardando despacho do centro de distribuição.</p>
                    </div>
                </li>
                <li class="cl-timeline-item">
                    <div class="cl-timeline-marker"></div>
                    <div class="cl-timeline-content">
                        <p class="cl-timeline-title">Envio</p>
                    </div>
                </li>
                <li class="cl-timeline-item cl-timeline-failed">
                    <div class="cl-timeline-marker"></div>
                    <div class="cl-timeline-content">
                        <p class="cl-timeline-title">Entrega</p>
                        <p class="cl-timeline-text">Tentativa de entrega falhou.</p>
                    </div>
                </li>
            </ul>
        </div>

        <div style="flex: 1;">
            <p class="u-fs-sm u-fw-medium u-mb-2">Horizontal</p>
            <ul class="cl-timeline cl-timeline-horizontal">
                <li class="cl-timeline-item cl-timeline-completed">
                    <div class="cl-timeline-marker"></div>
                    <div class="cl-timeline-content">
                        <p class="cl-timeline-title">Recebido</p>
                    </div>
                </li>
                <li class="cl-timeline-item cl-timeline-completed">
                    <div class="cl-timeline-marker"></div>
                    <div class="cl-timeline-content">
                        <p class="cl-timeline-title">Pago</p>
                    </div>
                </li>
                <li class="cl-timeline-item cl-timeline-active">
                    <div class="cl-timeline-marker"></div>
                    <div class="cl-timeline-content">
                        <p class="cl-timeline-title">Separação</p>
                    </div>
                </li>
                <li class="cl-timeline-item">
                    <div class="cl-timeline-marker"></div>
                    <div class="cl-timeline-content">
                        <p class="cl-timeline-title">Entrega</p>
                    </div>
                </li>
            </ul>
        </div>
    </div>


</body>
</html>
