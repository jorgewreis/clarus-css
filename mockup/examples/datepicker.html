<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup - Datepicker &amp; Timepicker</title>

    <!-- STYLES IMPORT -->
    <link rel="stylesheet" href="../../dist/css/fonts.css">
    <link rel="stylesheet" href="../../dist/css/components.css">
    <link rel="stylesheet" href="../../dist/css/forms.css">
    <link rel="stylesheet" href="../../dist/css/helpers.css">
    <style>
        .theme-panel {
            padding: 24px;
        }

        html[data-theme="dark"] .theme-panel {
            color: var(--cl-color-text);
            background-color: var(--cl-color-surface);
        }

        section {
            max-width: 320px;
            margin-bottom: 24px;
        }
    </style>
    <link rel="stylesheet" href="../assets/example-theme.css">
    <script src="../assets/example-theme.js"></script>
</head>
<body>

    <div class="theme-panel">
<section>
            <p class="u-fs-sm u-fw-medium u-mb-1">Datepicker — calendário customizado (JS)</p>
            <label for="datepicker-claro" class="cl-form-label">Data de entrega</label>
            <div class="cl-datepicker">
                <input type="text" class="cl-form-control" id="datepicker-claro" data-cl="datepicker" data-cl-target="#datepicker-claro-panel" placeholder="dd/mm/aaaa" value="15/07/2026">
            </div>
            <div id="datepicker-claro-panel"></div>
        </section>

        <section>
            <p class="u-fs-sm u-fw-medium u-mb-1">Date nativo — <code>&lt;input type="date"&gt;</code> estilizado (CSS-only)</p>
            <label for="native-date-claro" class="cl-form-label">Data de nascimento</label>
            <input type="date" class="cl-form-control" id="native-date-claro">
        </section>

        <section>
            <p class="u-fs-sm u-fw-medium u-mb-1">Time nativo — <code>&lt;input type="time"&gt;</code> estilizado (CSS-only)</p>
            <label for="native-time-claro" class="cl-form-label">Horário preferido</label>
            <input type="time" class="cl-form-control" id="native-time-claro">
        </section>
    </div>

    

    <!-- SCRIPTS IMPORT -->
    <script src="../../dist/js/clarus.js"></script>

</body>
</html>
