<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup - Nested Menu</title>

    <!-- STYLES IMPORT -->
    <link rel="stylesheet" href="../../dist/css/fonts.css">
    <link rel="stylesheet" href="../../dist/css/components.css">
    <link rel="stylesheet" href="../../dist/css/helpers.css">
    <style>
        .theme-panel {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 12px;
            min-height: 240px;
            padding: 24px;
        }

        html[data-theme="dark"] .theme-panel {
            color: var(--cl-color-text);
            background-color: var(--cl-color-surface);
        }
    </style>
    <link rel="stylesheet" href="../assets/example-theme.css">
    <script src="../assets/example-theme.js"></script>
</head>
<body>

    <div class="theme-panel">
<p class="u-fs-sm u-fw-medium u-mb-0">Submenus recursivos — hover, clique ou setas (→ abre, ← fecha)</p>

        <button type="button" class="cl-btn cl-dropdown-toggle" data-cl="nested-menu" data-cl-target="#menu-claro">Ações</button>
        <div class="cl-dropdown-menu" id="menu-claro">
            <a href="#" class="cl-dropdown-item">Novo arquivo</a>
            <a href="#" class="cl-dropdown-item">Abrir…</a>
            <div class="cl-dropdown-submenu">
                <button type="button" class="cl-dropdown-item cl-dropdown-item-submenu">Compartilhar</button>
                <div class="cl-dropdown-menu">
                    <a href="#" class="cl-dropdown-item">Copiar link</a>
                    <a href="#" class="cl-dropdown-item">E-mail</a>
                    <div class="cl-dropdown-submenu">
                        <button type="button" class="cl-dropdown-item cl-dropdown-item-submenu">Redes sociais</button>
                        <div class="cl-dropdown-menu">
                            <a href="#" class="cl-dropdown-item">Twitter / X</a>
                            <a href="#" class="cl-dropdown-item">LinkedIn</a>
                            <a href="#" class="cl-dropdown-item">Facebook</a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="cl-dropdown-submenu">
                <button type="button" class="cl-dropdown-item cl-dropdown-item-submenu">Exportar como</button>
                <div class="cl-dropdown-menu">
                    <a href="#" class="cl-dropdown-item">PDF</a>
                    <a href="#" class="cl-dropdown-item">PNG</a>
                    <a href="#" class="cl-dropdown-item is-disabled">SVG (em breve)</a>
                </div>
            </div>
            <hr class="cl-dropdown-divider">
            <a href="#" class="cl-dropdown-item">Excluir</a>
        </div>
    </div>

    

    <!-- SCRIPTS IMPORT -->
    <script src="../../dist/js/clarus.js"></script>

</body>
</html>
