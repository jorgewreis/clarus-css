<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup - File Input Drag-and-Drop</title>

    <!-- STYLES IMPORT -->
    <link rel="stylesheet" href="../dist/css/fonts.css">
    <link rel="stylesheet" href="../dist/css/forms.css">
    <link rel="stylesheet" href="../dist/css/helpers.css">
    <style>
        .theme-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 24px;
            background-color: var(--cl-color-subtle);
        }

        [data-theme="dark"].theme-panel {
            color: var(--cl-color-text);
            background-color: var(--cl-color-surface);
        }

        .theme-panel > div {
            max-width: 360px;
        }

        #resultado {
            font-size: 0.85rem;
            color: var(--cl-color-muted);
        }
    </style>
</head>
<body>

    <h2 class="u-fs-lg u-fw-medium" style="padding: 24px 24px 0;">Claro</h2>
    <div class="theme-panel">
        <p class="u-fs-sm u-fw-medium u-mb-0">Arraste um arquivo para a área abaixo (ou clique)</p>
        <div class="cl-file-upload">
            <input type="file" class="cl-file-input" id="arquivo-1">
            <label for="arquivo-1" class="cl-file-label cl-file-label-dropzone" data-cl="file-drop">
                <span>Arraste um arquivo aqui</span>
                <span class="cl-file-dropzone-hint">ou clique para escolher</span>
            </label>
        </div>
        <p id="resultado">Nenhum arquivo selecionado.</p>

        <p class="u-fs-sm u-fw-medium u-mb-0">Botão padrão (mesma funcionalidade, sem o visual de dropzone)</p>
        <div class="cl-file-upload">
            <input type="file" class="cl-file-input" id="arquivo-2">
            <label for="arquivo-2" class="cl-file-label" data-cl="file-drop">Escolher arquivo</label>
        </div>

        <p class="u-fs-sm u-fw-medium u-mb-0">Desabilitado</p>
        <div class="cl-file-upload">
            <input type="file" class="cl-file-input" id="arquivo-3" disabled>
            <label for="arquivo-3" class="cl-file-label cl-file-label-dropzone" data-cl="file-drop">
                <span>Desabilitado</span>
            </label>
        </div>
    </div>

    <h2 class="u-fs-lg u-fw-medium" data-theme="dark" style="padding: 24px 24px 0; background-color: var(--cl-color-surface); color: var(--cl-color-text); margin: 0;">Escuro</h2>
    <div class="theme-panel" data-theme="dark">
        <div class="cl-file-upload">
            <input type="file" class="cl-file-input" id="arquivo-dark">
            <label for="arquivo-dark" class="cl-file-label cl-file-label-dropzone" data-cl="file-drop">
                <span>Arraste um arquivo aqui</span>
                <span class="cl-file-dropzone-hint">ou clique para escolher</span>
            </label>
        </div>
    </div>

    <script src="../dist/js/clarus.js"></script>
    <script>
        document.getElementById("arquivo-1").addEventListener("change", (event) => {
            const file = event.target.files[0];
            document.getElementById("resultado").textContent = file ? `Selecionado: ${file.name}` : "Nenhum arquivo selecionado.";
        });
    </script>
</body>
</html>
