<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup - Segmented Control</title>

    <!-- STYLES IMPORT -->
    <link rel="stylesheet" href="../dist/css/fonts.css">
    <link rel="stylesheet" href="../dist/css/components.css">
    <link rel="stylesheet" href="../dist/css/helpers.css">
    <style>
        .theme-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 24px;
            background-color: var(--cl-color-subtle);
        }

        [data-theme="dark"].theme-panel {
            color: var(--cl-color-text);
            background-color: var(--cl-color-surface);
        }
    </style>
</head>
<body>

    <h2 class="u-fs-lg u-fw-medium" style="padding: 24px 24px 0;">Claro</h2>
    <div class="theme-panel">
        <p class="u-fs-sm u-fw-medium u-mb-0">Exclusivo (radio) — tamanhos</p>
        <div class="cl-segmented-control cl-segmented-control-sm">
            <div class="cl-segmented-item">
                <input type="radio" name="periodo-sm" id="periodo-sm-dia" class="cl-segmented-input" checked>
                <label for="periodo-sm-dia" class="cl-segmented-label">Dia</label>
            </div>
            <div class="cl-segmented-item">
                <input type="radio" name="periodo-sm" id="periodo-sm-semana" class="cl-segmented-input">
                <label for="periodo-sm-semana" class="cl-segmented-label">Semana</label>
            </div>
            <div class="cl-segmented-item">
                <input type="radio" name="periodo-sm" id="periodo-sm-mes" class="cl-segmented-input">
                <label for="periodo-sm-mes" class="cl-segmented-label">Mês</label>
            </div>
        </div>

        <div class="cl-segmented-control">
            <div class="cl-segmented-item">
                <input type="radio" name="periodo" id="periodo-dia" class="cl-segmented-input">
                <label for="periodo-dia" class="cl-segmented-label">Dia</label>
            </div>
            <div class="cl-segmented-item">
                <input type="radio" name="periodo" id="periodo-semana" class="cl-segmented-input" checked>
                <label for="periodo-semana" class="cl-segmented-label">Semana</label>
            </div>
            <div class="cl-segmented-item">
                <input type="radio" name="periodo" id="periodo-mes" class="cl-segmented-input">
                <label for="periodo-mes" class="cl-segmented-label">Mês</label>
            </div>
            <div class="cl-segmented-item">
                <input type="radio" name="periodo" id="periodo-ano" class="cl-segmented-input" disabled>
                <label for="periodo-ano" class="cl-segmented-label">Ano</label>
            </div>
        </div>

        <div class="cl-segmented-control cl-segmented-control-lg">
            <div class="cl-segmented-item">
                <input type="radio" name="periodo-lg" id="periodo-lg-dia" class="cl-segmented-input" checked>
                <label for="periodo-lg-dia" class="cl-segmented-label">Dia</label>
            </div>
            <div class="cl-segmented-item">
                <input type="radio" name="periodo-lg" id="periodo-lg-semana" class="cl-segmented-input">
                <label for="periodo-lg-semana" class="cl-segmented-label">Semana</label>
            </div>
        </div>

        <p class="u-fs-sm u-fw-medium u-mb-0">Inclusivo (checkbox) — múltipla seleção</p>
        <div class="cl-segmented-control">
            <div class="cl-segmented-item">
                <input type="checkbox" id="filtro-negrito" class="cl-segmented-input" checked>
                <label for="filtro-negrito" class="cl-segmented-label u-fw-medium">B</label>
            </div>
            <div class="cl-segmented-item">
                <input type="checkbox" id="filtro-italico" class="cl-segmented-input">
                <label for="filtro-italico" class="cl-segmented-label">I</label>
            </div>
            <div class="cl-segmented-item">
                <input type="checkbox" id="filtro-sublinhado" class="cl-segmented-input" checked>
                <label for="filtro-sublinhado" class="cl-segmented-label">U</label>
            </div>
        </div>
    </div>

    <h2 class="u-fs-lg u-fw-medium" data-theme="dark" style="padding: 24px 24px 0; background-color: var(--cl-color-surface); color: var(--cl-color-text); margin: 0;">Escuro</h2>
    <div class="theme-panel" data-theme="dark">
        <div class="cl-segmented-control">
            <div class="cl-segmented-item">
                <input type="radio" name="periodo-dark" id="periodo-dark-dia" class="cl-segmented-input">
                <label for="periodo-dark-dia" class="cl-segmented-label">Dia</label>
            </div>
            <div class="cl-segmented-item">
                <input type="radio" name="periodo-dark" id="periodo-dark-semana" class="cl-segmented-input" checked>
                <label for="periodo-dark-semana" class="cl-segmented-label">Semana</label>
            </div>
            <div class="cl-segmented-item">
                <input type="radio" name="periodo-dark" id="periodo-dark-mes" class="cl-segmented-input">
                <label for="periodo-dark-mes" class="cl-segmented-label">Mês</label>
            </div>
            <div class="cl-segmented-item">
                <input type="radio" name="periodo-dark" id="periodo-dark-ano" class="cl-segmented-input" disabled>
                <label for="periodo-dark-ano" class="cl-segmented-label">Ano</label>
            </div>
        </div>
    </div>

</body>
</html>
