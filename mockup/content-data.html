<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Clarus — Conteúdo e dados</title><link rel="stylesheet" href="../dist/css/fonts.css"><link rel="stylesheet" href="../dist/css/components.css"><link rel="stylesheet" href="../dist/css/forms.css"><link rel="stylesheet" href="../dist/css/helpers.css"><link rel="stylesheet" href="assets/showcase.css"></head><body><main class="showcase-shell"><header class="showcase-hero"><p class="showcase-eyebrow">Clarus CSS · laboratório</p><h1 class="showcase-title">Conteúdo, coleções e dados</h1><p class="showcase-lead">Contêineres de conteúdo, visualizações sequenciais e componentes tabulares para dados densos. Cada exemplo demonstra o componente em contexto realista.</p></header><div class="showcase-toolbar"><button class="cl-btn cl-btn-primary" type="button" data-showcase-theme>Usar tema escuro</button><a class="cl-btn" href="README.md">Índice dos laboratórios</a></div><nav class="showcase-nav" aria-label="Componentes desta página" data-showcase-navigation></nav><div data-showcase-sections></div></main><script id="showcase-catalog" type="application/json">[
{"id":"card","title":"Card","description":"Superfície para apresentar uma unidade de conteúdo completa — por exemplo, um produto, documento, pessoa, resumo de pedido ou resultado de busca — com informação e ações relacionadas.","use":[{"label":"Coleções comparáveis","text":"cards de produto, artigos, planos ou projetos quando cada item precisa de título, metadados e uma ação."},{"label":"Resumo independente","text":"painéis de dashboard, prévias de relatório ou blocos de configuração que continuam compreensíveis fora da grade."},{"label":"Evite para","text":"listas densas e repetitivas: Tile ou Table costumam facilitar a varredura visual."}],"api":[{"label":".cl-card","code":true,"text":"cria a superfície, borda e espaçamento-base."},{"label":".cl-card-header / .cl-card-body / .cl-card-footer","code":true,"text":"seções opcionais para cabeçalho, conteúdo e ações/metadados finais."},{"label":".cl-card-horizontal","code":true,"text":"organiza as seções lado a lado; útil para imagem ou resumo curto."},{"label":".cl-card-clickable + .cl-stretched-link","code":true,"text":"expande um link real para toda a área sem aninhar controles."}],"a11y":[{"label":"Link real","text":"na versão clicável, use um <a href> com .cl-stretched-link; ele recebe foco e acionamento por teclado."},{"label":"Ações concorrentes","text":"se houver botões ou links adicionais, mantenha-os acima da área expandida e com nomes claros."},{"label":"Hierarquia","text":"use um título que explique o destino ou o conteúdo do card mesmo quando lido isoladamente."}],"states":[{"label":"Clicável","text":"hover e focus-within elevam o card e destacam a borda; valide ambos no laboratório."},{"label":"Densidade","text":".cl-card-sm e .cl-card-lg alteram apenas o espaçamento interno."},{"label":"Composição","text":"experimente cabeçalho, rodapé, imagem e ação sem transformar o card inteiro em um botão semântico."}],"source":"examples/cards.html","height":1100},
{"id":"tile","title":"Tile","description":"Linha compacta para uma escolha, arquivo, preferência, pessoa ou métrica curta. Prioriza escaneamento: ícone, duas linhas de texto e uma ação adjacente.","use":[{"label":"Listas operacionais","text":"arquivos recentes, membros, integrações, métodos de pagamento ou preferências em uma tela de configurações."},{"label":"Escolhas rápidas","text":"opções de plano, tema ou destino quando a leitura precisa ser curta e comparável."},{"label":"Evite para","text":"descrições longas ou múltiplas ações principais; um Card oferece espaço e hierarquia melhores."}],"api":[{"label":".cl-tile","code":true,"text":"define a linha compacta com alinhamento entre ícone, conteúdo e ações."},{"label":".cl-tile-icon / .cl-tile-body","code":true,"text":"reservam o ícone e o bloco com título e subtítulo."},{"label":".cl-tile-actions-bottom","code":true,"text":"move ações para uma segunda linha quando não couberem à direita."},{"label":".cl-tile-clickable + .cl-stretched-link","code":true,"text":"faz do link interno o destino de toda a superfície."}],"a11y":[{"label":"Truncamento","text":"título e subtítulo podem usar reticências; mantenha o texto completo no DOM e use title quando a perda visual for crítica."},{"label":"Ícones","text":"ícones puramente decorativos devem usar aria-hidden; se transmitirem estado, inclua texto equivalente."},{"label":"Ação","text":"um tile navegável precisa de link real; switch, checkbox e botões mantêm sua semântica própria."}],"states":[{"label":"Ação e seleção","text":"confira hover, focus-visible, selecionado e disabled nos controles inseridos."},{"label":"Responsividade","text":"use ações abaixo quando a largura não comportar conteúdo e botões na mesma linha."},{"label":"Tamanho","text":".cl-tile-sm e .cl-tile-lg ajustam a densidade para listas mais compactas ou mais confortáveis."}],"source":"examples/tile.html","height":900},
{"id":"carousel","title":"Carousel","description":"Sequência navegável de painéis, conteúdo ou mídias. O laboratório compara um painel editorial, um painel sem mídia, uma transição fade e imagens de fundo com legendas laterais.","use":[{"label":"Destaques complementares","text":"campanhas, recursos do produto, histórias de clientes ou galerias curtas em que cada slide acrescenta contexto."},{"label":"Painéis em espaço limitado","text":"resumos de onboarding ou anúncios relacionados quando o usuário pode navegar no próprio ritmo."},{"label":"Evite para","text":"instruções, preços, avisos ou CTA essenciais: informação prioritária não deve depender da troca de slide."}],"api":[{"label":".cl-carousel + data-cl=\"carousel\"","code":true,"text":"contêiner obrigatório; inicializa trilha, navegação, teclado e arraste. Informe também aria-label=\"…\" para nomeá-lo."},{"label":".cl-carousel-inner","code":true,"text":"trilha obrigatória que envolve todos os slides; o JavaScript move esta camada."},{"label":".cl-carousel-item + .is-active","code":true,"text":"cada slide usa .cl-carousel-item; adicione is-active somente ao slide inicial. O JavaScript atualiza esse estado depois."},{"label":".cl-carousel-control-prev / .cl-carousel-control-next","code":true,"text":"botões opcionais de anterior e próximo. Inseridos como filhos do contêiner, formam a barra superior ao lado do toggle."},{"label":".cl-carousel-control-toggle + data-cl-carousel-toggle","code":true,"text":"botão opcional de pausa/reprodução. Use ambos no mesmo botão; o JavaScript gerencia ícone, aria-label e aria-pressed."},{"label":".cl-carousel-indicators > li > button","code":true,"text":"lista opcional de indicadores; inclua um botão por slide com aria-label=\"Ir para o slide N\". is-active e aria-current são geridos pelo JavaScript."},{"label":"[data-cl-carousel-counter]","code":true,"text":"elemento opcional que recebe automaticamente o texto \"1 de N\". Use aria-hidden=\"true\" se for apenas reforço visual."},{"label":".cl-carousel-progress[data-cl-carousel-progress] > span","code":true,"text":"barra opcional do autoplay; o atributo liga a animação ao intervalo e o span interno é obrigatório."},{"label":".cl-carousel-caption","code":true,"text":"legenda opcional dentro de cada slide, com título, texto e CTA. Respeita automaticamente as áreas seguras dos controles e indicadores."},{"label":".cl-carousel-media / .cl-carousel-media-placeholder","code":true,"text":"media cria área de fundo com background-image; placeholder cria painel de conteúdo sem imagem. Para fundo decorativo, use aria-hidden=\"true\"."},{"label":"data-autoplay=\"true\"","code":true,"text":"único valor que liga o avanço automático. Omita o atributo ou use \"false\" para navegação manual."},{"label":"data-interval=\"5000\"","code":true,"text":"tempo entre slides em milissegundos; use inteiro positivo, sem parênteses. Ausente, não numérico ou 0 usa 5000 ms."},{"label":"data-drag=\"false\"","code":true,"text":"desliga arraste; omita ou use qualquer outro valor para mantê-lo ativo. Indicado para slides muito interativos."},{"label":".cl-carousel-fade / .cl-carousel-no-media","code":true,"text":"fade troca slides por opacidade; no-media aplica painéis de superfície e funciona com placeholder."},{"label":".cl-carousel-caption-side / -start / -stacked","code":true,"text":"side posiciona a legenda lateral, start a leva à esquerda e stacked a coloca abaixo da mídia."},{"label":".cl-carousel-hide-indicators-two","code":true,"text":"oculta indicadores somente quando há exatamente dois slides."},{"label":".is-static / .is-two-slides / .is-autoplay-paused / .is-dragging","code":true,"text":"estados internos aplicados pelo JavaScript; não os adicione manualmente."}],"a11y":[{"label":"Nome obrigatório","text":"forneça aria-label descritivo no contêiner e aria-label em cada botão somente de ícone."},{"label":"Movimento controlável","text":"o toggle chama pause()/play(); hover, foco e aba oculta suspendem temporariamente o autoplay."},{"label":"Teclado e gesto","text":"setas, Home e End funcionam no contêiner; o arraste preserva rolagem vertical e ignora links e controles."}],"states":[{"label":"Áreas seguras","text":"legenda não invade barra superior ou indicadores; no compacto, o gradiente cobre a mídia sem criar rolagem interna."},{"label":"Variações","text":"fade, sem mídia, legenda empilhada, lateral e slide único estático devem ser testados em claro e escuro."},{"label":"Interação","text":"valide hover, focus-visible, ativo, pausa, arraste concluído/cancelado e prefers-reduced-motion."}],"source":"examples/carousel.html","height":1500},
{"id":"timeline","title":"Timeline","description":"Sequência cronológica de eventos com estado visual por etapa. Funciona tanto para histórico concluído quanto para progresso que ainda está em andamento.","use":[{"label":"Histórico auditável","text":"atualizações de pedido, atividades de conta, ocorrências de suporte ou alterações de status."},{"label":"Progresso de processo","text":"entrega, aprovação, implantação ou etapas de uma solicitação já iniciada."},{"label":"Evite para","text":"uma tarefa que exige navegação e validação passo a passo; nesse caso, use Stepper."}],"api":[{"label":"ol.cl-timeline","code":true,"text":"mantém a lista de eventos em ordem semântica e visual."},{"label":".cl-timeline-item","code":true,"text":"representa um evento com marcador, conteúdo, título, texto e horário opcionais."},{"label":".cl-timeline-horizontal","code":true,"text":"muda o eixo para colunas; prefira apenas quando houver poucos eventos e espaço suficiente."},{"label":".cl-timeline-active / -completed / -failed","code":true,"text":"expressam em andamento, concluído e falha; sem classe, o evento fica pendente."}],"a11y":[{"label":"Ordem real","text":"use <ol> e mantenha no DOM a mesma ordem cronológica apresentada visualmente."},{"label":"Data legível","text":"inclua data/hora em texto; cor e ícone não podem ser a única forma de comunicar o estado."},{"label":"Interação adicional","text":"a Timeline é CSS puro; se um item abrir detalhes, forneça um link ou botão com comportamento e foco próprios."}],"states":[{"label":"Progresso","text":"completed colore o marcador e o conector seguinte; active indica a etapa em curso."},{"label":"Falha","text":"failed destaca o evento crítico, mas deve ser acompanhado por texto explicativo."},{"label":"Eixo","text":"compare a leitura vertical e horizontal em telas pequenas antes de escolher a variação."}],"source":"examples/timeline.html","height":820},
{"id":"charts","title":"Charts","description":"Tokens de cor e contraste para conectar uma biblioteca de gráficos ao tema Clarus. O framework não inclui nem impõe uma biblioteca de visualização.","use":[{"label":"Séries temáticas","text":"gráficos de barras, linhas, área, pizza ou dispersão feitos com Chart.js, ECharts, D3 ou outra biblioteca."},{"label":"Troca de tema/marca","text":"dashboards que precisam manter séries, grade e tooltip coerentes em claro, escuro ou multi-brand."},{"label":"Antes de desenhar","text":"defina a pergunta: comparação, evolução, distribuição ou composição; não escolha o gráfico só pela aparência."}],"api":[{"label":"--cl-chart-series-1 … -6","code":true,"text":"cores categóricas para séries ou categorias."},{"label":"--cl-chart-grid / --cl-chart-axis","code":true,"text":"cores de grade, rótulos e eixos."},{"label":"--cl-chart-tooltip-bg / -text","code":true,"text":"superfície e texto do tooltip da biblioteca."},{"label":"getComputedStyle","code":true,"text":"leia os tokens ao montar a configuração e releia-os após trocar tema ou marca."}],"a11y":[{"label":"Alternativa equivalente","text":"ofereça tabela, resumo textual ou dados acessíveis que respondam à mesma pergunta do gráfico."},{"label":"Não dependa de cor","text":"use rótulos, padrões, marcadores ou legenda quando uma série precisar ser distinguida."},{"label":"Tooltip","text":"informação exclusiva do hover deve ter alternativa por foco, texto próximo ou tabela."}],"states":[{"label":"Tema","text":"tokens seguem data-theme e data-brand, mas a biblioteca pode exigir atualização ou recriação do gráfico."},{"label":"Dados","text":"projete explicitamente estados vazio, carregando e erro fora da área do gráfico."},{"label":"Paleta","text":"há seis séries; para escala sequencial, divergente ou mais categorias, sobrescreva tokens de forma intencional."}],"source":"examples/charts.html","height":800},
{"id":"table","title":"Table","description":"Tabela HTML semântica para relações reais entre linhas e colunas; as classes Clarus alteram apresentação, não a estrutura dos dados.","use":[{"label":"Comparação precisa","text":"planos, pedidos, permissões, resultados de busca ou métricas em que o usuário cruza linhas e colunas."},{"label":"Dados verificáveis","text":"situações em que valores exatos são mais importantes que uma visualização resumida."},{"label":"Evite para","text":"layout de página, cartões de conteúdo ou listas estreitas; use Grid, Card ou Tile conforme o caso."}],"api":[{"label":".cl-table","code":true,"text":"aplica a aparência base à tabela nativa."},{"label":".cl-table-striped / .cl-table-hover","code":true,"text":"melhoram a leitura de linhas longas e o acompanhamento pelo cursor."},{"label":".cl-table-bordered / .cl-table-borderless / .cl-table-sm","code":true,"text":"ajustam bordas e densidade sem mudar a semântica."},{"label":".cl-table-responsive","code":true,"text":"fica no div envolvente e habilita rolagem horizontal em telas estreitas."}],"a11y":[{"label":"Cabeçalhos","text":"use th com scope=\"col\" ou scope=\"row\" conforme a relação da célula."},{"label":"Contexto","text":"adicione caption em tabelas complexas ou quando o título próximo não bastar."},{"label":"Rolagem","text":"a variante responsiva preserva a tabela inteira; confira se colunas-chave e cabeçalhos continuam identificáveis."}],"states":[{"label":"Visual","text":"combine listras, hover, bordas e tamanho compacto apenas quando aumentarem legibilidade."},{"label":"Responsividade","text":"teste a rolagem horizontal, em vez de esconder dados ou quebrar células sem critério."},{"label":"Comportamento","text":"Table é estática; para filtro, ordenação ou paginação, use DataTable."}],"source":"examples/tables-navbar.html","height":750},
{"id":"datatable","title":"DataTable","description":"Camada JavaScript sobre uma Table semântica para filtrar, ordenar e paginar uma coleção no cliente, incluindo estados de vazio, carregamento e erro.","use":[{"label":"Coleções operáveis","text":"usuários, pedidos, arquivos ou transações quando a pessoa precisa encontrar, ordenar e percorrer muitos registros."},{"label":"Dados já carregados","text":"cenários client-side em que as linhas podem ser lidas e manipuladas no navegador."},{"label":"Evite para","text":"volumes que exigem paginação/filtragem no servidor ou uma grade altamente customizada; o componente não substitui um data grid completo."}],"api":[{"label":"<div class=\"cl-datatable\" data-cl=\"datatable\">","code":true,"text":"envolve toolbar, tabela, mensagens e paginação; data-cl não vai no table."},{"label":"data-cl-page-size=\"25\"","code":true,"text":"aceita número inteiro de linhas por página; se ausente, inválido ou 0, usa 10."},{"label":"data-cl-sort=\"name\"","code":true,"text":"vai no th e cria ordenação para a chave informada. Combine com data-cl-sort-type=\"text\", \"number\", \"currency\" ou \"date\"."},{"label":"data-cl-sort-value=\"2026-07-14\"","code":true,"text":"vai no td quando o valor de ordenação difere do texto formatado exibido."},{"label":"data-cl-datatable-filter","code":true,"text":"adicione ao input de busca dentro do contêiner; o filtro procura texto em qualquer célula."},{"label":"data-cl-datatable-empty / -loading / -error","code":true,"text":"marcam blocos opcionais para cada estado; refresh(), setLoading() e setError() atualizam a instância."}],"a11y":[{"label":"Ordenação anunciada","text":"o componente atualiza aria-sort no th e usa botão interno focável para ativar a ordenação."},{"label":"Navegação em grade","text":"células visíveis usam roving tabindex; setas movem o foco e Home/End percorrem a linha ou tabela."},{"label":"Estado compreensível","text":"mensagens de vazio, carregando e erro precisam explicar o que ocorreu e a próxima ação quando houver."}],"states":[{"label":"Dados","text":"valide vazio por filtro, carregando e erro antes de publicar; tabela e paginação são ocultadas nesses estados."},{"label":"Ordenação","text":"cada coluna alterna ascendente, descendente e sem ordenação; use data-cl-sort-value para valores formatados."},{"label":"Paginação","text":"o nav aparece apenas com mais de uma página; confirme filtro, contagem e retorno à página correta."}],"source":"examples/datatable.html","height":1150}
]</script><script src="../dist/js/clarus.js"></script><script src="assets/showcase.js"></script></body></html>
