<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Template - Autenticação | Clarus CSS</title>

    <!-- STYLES IMPORT -->
    <link rel="stylesheet" href="../../dist/css/fonts.css">
    <link rel="stylesheet" href="../../dist/css/forms.css">
    <link rel="stylesheet" href="../../dist/css/components.css">
    <link rel="stylesheet" href="../../dist/css/helpers.css">
    <style>
        body {
            margin: 0;
        }

        .auth-shell {
            display: flex;
            min-height: 100vh;
        }

        .auth-brand-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 24px;
            padding: 48px;
            color: #fff;
            background-color: var(--cl-color-primary);
            background: linear-gradient(160deg, var(--cl-color-primary), color-mix(in oklch, var(--cl-color-primary), black 30%));
        }

        @media (max-width: 767px) {
            .auth-brand-panel {
                display: none;
            }
        }

        .auth-brand-feature {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .auth-form-panel {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            position: relative;
        }

        .auth-form-panel-inner {
            width: 100%;
            max-width: 380px;
        }

        .auth-theme-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .password-toggle-icon-open {
            display: inline;
        }

        .password-toggle-icon-closed {
            display: none;
        }

        [data-password-visible="true"] .password-toggle-icon-open {
            display: none;
        }

        [data-password-visible="true"] .password-toggle-icon-closed {
            display: inline;
        }
    </style>
</head>
<body>

<!--
  Template "Autenticação" — login/cadastro num painel dividido, com Tabs
  (data-cl="tabs") pra alternar entre os dois formulários e um toggle de
  visibilidade de senha via .cl-input-group + botão. Ver
  docs/README.md#templates-prontos.
-->

<div class="auth-shell">
    <div class="auth-brand-panel">
        <div class="u-d-flex u-align-items-center" style="gap: 10px;">
            <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
            <span class="u-fs-xl u-fw-medium">Clarus</span>
        </div>
        <h1 class="u-fs-h2 u-fw-medium u-mb-0">Construa interfaces consistentes, mais rápido.</h1>
        <p class="u-fs-md u-mb-0" style="opacity: 0.85;">Componentes acessíveis, tema escuro nativo e zero dependências — tudo pronto pra usar.</p>

        <div class="cl-stack u-mt-3">
            <div class="auth-brand-feature">
                <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.801 10A10 10 0 1 1 17 3.335"/><path d="m9 11 3 3L22 4"/></svg>
                <span>WCAG 2.1 AA por padrão, em todos os componentes</span>
            </div>
            <div class="auth-brand-feature">
                <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.801 10A10 10 0 1 1 17 3.335"/><path d="m9 11 3 3L22 4"/></svg>
                <span>Tema escuro nativo via <code>data-theme</code></span>
            </div>
            <div class="auth-brand-feature">
                <svg aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.801 10A10 10 0 1 1 17 3.335"/><path d="m9 11 3 3L22 4"/></svg>
                <span>Zero dependências de runtime</span>
            </div>
        </div>
    </div>

    <div class="auth-form-panel">
        <button type="button" class="cl-btn auth-theme-toggle" id="theme-toggle" aria-label="Alternar tema escuro">
            <svg class="cl-icon" id="theme-toggle-icon" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
        </button>

        <div class="auth-form-panel-inner">
            <div class="cl-tabs cl-tabs-pill u-mb-3" data-cl="tabs" id="auth-tabs">
                <a href="#" class="cl-nav-link is-active" data-cl-target="#tab-login">Entrar</a>
                <a href="#" class="cl-nav-link" data-cl-target="#tab-cadastro">Criar conta</a>
            </div>

            <div class="cl-tab-content">
                <div class="cl-tab-pane is-active" id="tab-login">
                    <form>
                        <div class="cl-form-row u-mb-2">
                            <div class="cl-form-col">
                                <label for="login-email" class="cl-form-label">E-mail</label>
                                <input type="email" class="cl-form-control" id="login-email" placeholder="voce@empresa.com" required>
                            </div>
                        </div>
                        <div class="cl-form-row u-mb-2">
                            <div class="cl-form-col">
                                <label for="login-password" class="cl-form-label">Senha</label>
                                <div class="cl-input-group" data-password-visible="false" id="login-password-group">
                                    <input type="password" class="cl-form-control" id="login-password" placeholder="••••••••" required>
                                    <button type="button" class="cl-btn" data-password-toggle="login-password" data-password-group="login-password-group" aria-label="Mostrar senha">
                                        <svg class="cl-icon password-toggle-icon-open" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
                                        <svg class="cl-icon password-toggle-icon-closed" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"/><path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"/><path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"/><path d="m2 2 20 20"/></svg>
                                    </button>
                                </div>
                            </div>
                        </div>
                        <div class="u-d-flex u-justify-content-between u-align-items-center u-mb-3">
                            <div class="cl-check">
                                <input type="checkbox" class="cl-check-input" id="login-remember">
                                <label for="login-remember" class="cl-check-label cl-form-size-md">Lembrar de mim</label>
                            </div>
                            <a href="#" class="u-fs-sm">Esqueceu a senha?</a>
                        </div>
                        <button type="submit" class="cl-btn cl-btn-primary" style="width: 100%;">Entrar</button>
                    </form>
                </div>

                <div class="cl-tab-pane" id="tab-cadastro">
                    <form>
                        <div class="cl-form-row u-mb-2">
                            <div class="cl-form-col">
                                <label for="signup-name" class="cl-form-label">Nome completo</label>
                                <input type="text" class="cl-form-control" id="signup-name" placeholder="Seu nome" required>
                            </div>
                        </div>
                        <div class="cl-form-row u-mb-2">
                            <div class="cl-form-col">
                                <label for="signup-email" class="cl-form-label">E-mail</label>
                                <input type="email" class="cl-form-control" id="signup-email" placeholder="voce@empresa.com" required>
                            </div>
                        </div>
                        <div class="cl-form-row u-mb-2">
                            <div class="cl-form-col">
                                <label for="signup-password" class="cl-form-label">Senha</label>
                                <input type="password" class="cl-form-control" id="signup-password" placeholder="Mínimo 8 caracteres" required>
                            </div>
                        </div>
                        <div class="u-mb-3">
                            <div class="cl-check">
                                <input type="checkbox" class="cl-check-input" id="signup-terms" required>
                                <label for="signup-terms" class="cl-check-label cl-form-size-md">Aceito os termos de uso e a política de privacidade</label>
                            </div>
                        </div>
                        <button type="submit" class="cl-btn cl-btn-primary" style="width: 100%;">Criar conta</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- SCRIPTS IMPORT -->
<script src="../../dist/js/clarus.js"></script>
<script>
    // Alternância de tema — mesmo mecanismo de docs/guides/dark-mode.md.
    const sunIcon = '<circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/>';
    const moonIcon = '<path d="M20.985 12.486a9 9 0 1 1-9.473-9.472c.405-.022.617.46.402.803a6 6 0 0 0 8.268 8.268c.344-.215.825-.004.803.401"/>';

    const toggle = document.getElementById("theme-toggle");
    const icon = document.getElementById("theme-toggle-icon");

    function applyTheme(theme) {
        document.documentElement.setAttribute("data-theme", theme);
        icon.innerHTML = theme === "dark" ? moonIcon : sunIcon;
    }

    const stored = localStorage.getItem("theme") ||
        (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
    applyTheme(stored);

    toggle.addEventListener("click", () => {
        const next = document.documentElement.getAttribute("data-theme") === "dark" ? "light" : "dark";
        applyTheme(next);
        localStorage.setItem("theme", next);
    });

    // Mostrar/ocultar senha — alterna o type do input e o ícone do botão.
    document.querySelectorAll("[data-password-toggle]").forEach((btn) => {
        btn.addEventListener("click", () => {
            const input = document.getElementById(btn.dataset.passwordToggle);
            const group = document.getElementById(btn.dataset.passwordGroup);
            const visible = group.dataset.passwordVisible === "true";
            input.type = visible ? "password" : "text";
            group.dataset.passwordVisible = String(!visible);
            btn.setAttribute("aria-label", visible ? "Mostrar senha" : "Ocultar senha");
        });
    });
</script>

</body>
</html>
