<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup - Alert Dialog / Confirm</title>

    <!-- STYLES IMPORT -->
    <link rel="stylesheet" href="../dist/css/fonts.css">
    <link rel="stylesheet" href="../dist/css/components.css">
    <link rel="stylesheet" href="../dist/css/helpers.css">
    <style>
        .theme-panel {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 12px;
            padding: 24px;
        }

        [data-theme="dark"].theme-panel {
            color: var(--clarus-color-text);
            background-color: var(--clarus-color-surface);
        }

        #resultado {
            font-size: 0.85rem;
            color: var(--clarus-color-muted);
        }
    </style>
</head>
<body>

    <div class="theme-panel">
        <h2 class="fs-lg fw-medium">Claro</h2>

        <button type="button" class="btn btn-danger" id="btn-excluir">Excluir item</button>
        <button type="button" class="btn btn-primary" id="btn-sair">Sair sem salvar</button>
        <button type="button" class="btn btn-success" id="btn-publicar">Publicar</button>
        <p id="resultado">Clique num botão para abrir o Alert Dialog.</p>
    </div>

    <div class="theme-panel" data-theme="dark">
        <h2 class="fs-lg fw-medium">Escuro</h2>
        <button type="button" class="btn btn-danger" id="btn-excluir-dark">Excluir item</button>
    </div>

    <script src="../dist/js/clarus.js"></script>
    <script>
        const resultado = document.getElementById("resultado");

        document.getElementById("btn-excluir").addEventListener("click", async () => {
            const confirmed = await Clarus.confirm({
                title: "Excluir item?",
                message: "Essa ação não pode ser desfeita.",
                confirmText: "Excluir",
                cancelText: "Cancelar",
                variant: "danger",
            });
            resultado.textContent = confirmed ? "Confirmado: item excluído." : "Cancelado.";
        });

        document.getElementById("btn-sair").addEventListener("click", async () => {
            const confirmed = await Clarus.confirm({
                title: "Sair sem salvar?",
                message: "Suas alterações serão perdidas.",
                confirmText: "Sair",
                variant: "primary",
            });
            resultado.textContent = confirmed ? "Confirmado: saiu sem salvar." : "Cancelado.";
        });

        document.getElementById("btn-publicar").addEventListener("click", async () => {
            const confirmed = await Clarus.confirm({
                title: "Publicar agora?",
                confirmText: "Publicar",
                variant: "success",
            });
            resultado.textContent = confirmed ? "Confirmado: publicado." : "Cancelado.";
        });

        document.getElementById("btn-excluir-dark")?.addEventListener("click", () => {
            Clarus.confirm({ title: "Excluir item?", variant: "danger", confirmText: "Excluir" });
        });
    </script>
</body>
</html>
