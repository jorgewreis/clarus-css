<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup - Range/Slider</title>

    <!-- STYLES IMPORT -->
    <link rel="stylesheet" href="../dist/css/fonts.css">
    <link rel="stylesheet" href="../dist/css/forms.css">
    <link rel="stylesheet" href="../dist/css/helpers.css">
    <style>
        .theme-panel {
            padding: 24px;
        }

        [data-theme="dark"].theme-panel {
            color: var(--cl-color-text);
            background-color: var(--cl-color-surface);
        }

        .range-row {
            display: flex;
            align-items: center;
            gap: 12px;
            max-width: 320px;
            margin-bottom: 16px;
        }

        .range-row .cl-form-range {
            flex: 1;
        }
    </style>
</head>
<body>

    <div class="theme-panel">
        <h2 class="u-fs-lg u-fw-medium">Claro</h2>

        <p class="u-fs-sm u-fw-medium u-mt-3 u-mb-2">Padrão</p>
        <label for="volume" class="cl-form-label">Volume</label>
        <input type="range" class="cl-form-range" id="volume" min="0" max="100" value="40">

        <p class="u-fs-sm u-fw-medium u-mt-3 u-mb-2">Com valor visível (data-cl="range")</p>
        <div class="range-row">
            <input type="range" class="cl-form-range" id="brilho" min="0" max="100" value="65"
                aria-label="Brilho" data-cl="range" data-cl-target="#brilho-output">
            <output class="cl-range-output" id="brilho-output" for="brilho">65</output>
        </div>

        <p class="u-fs-sm u-fw-medium u-mt-3 u-mb-2">Com marcações (datalist)</p>
        <input type="range" class="cl-form-range" min="0" max="100" step="25" value="50" list="marcas-claro" aria-label="Nível (com marcações)">
        <datalist id="marcas-claro">
            <option value="0"></option>
            <option value="25"></option>
            <option value="50"></option>
            <option value="75"></option>
            <option value="100"></option>
        </datalist>

        <p class="u-fs-sm u-fw-medium u-mt-3 u-mb-2">Desabilitado</p>
        <input type="range" class="cl-form-range" min="0" max="100" value="30" aria-label="Controle desabilitado" disabled>
    </div>

    <div class="theme-panel" data-theme="dark">
        <h2 class="u-fs-lg u-fw-medium">Escuro</h2>

        <p class="u-fs-sm u-fw-medium u-mt-3 u-mb-2">Padrão</p>
        <label for="volume-d" class="cl-form-label">Volume</label>
        <input type="range" class="cl-form-range" id="volume-d" min="0" max="100" value="40">

        <p class="u-fs-sm u-fw-medium u-mt-3 u-mb-2">Com valor visível (data-cl="range")</p>
        <div class="range-row">
            <input type="range" class="cl-form-range" id="brilho-d" min="0" max="100" value="65"
                aria-label="Brilho" data-cl="range" data-cl-target="#brilho-output-d">
            <output class="cl-range-output" id="brilho-output-d" for="brilho-d">65</output>
        </div>

        <p class="u-fs-sm u-fw-medium u-mt-3 u-mb-2">Com marcações (datalist)</p>
        <input type="range" class="cl-form-range" min="0" max="100" step="25" value="50" list="marcas-escuro" aria-label="Nível (com marcações)">
        <datalist id="marcas-escuro">
            <option value="0"></option>
            <option value="25"></option>
            <option value="50"></option>
            <option value="75"></option>
            <option value="100"></option>
        </datalist>

        <p class="u-fs-sm u-fw-medium u-mt-3 u-mb-2">Desabilitado</p>
        <input type="range" class="cl-form-range" min="0" max="100" value="30" aria-label="Controle desabilitado" disabled>
    </div>

    <script src="../dist/js/clarus.js"></script>
</body>
</html>
