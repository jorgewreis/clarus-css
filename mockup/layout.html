<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup - Layout</title>

    <!-- STYLES IMPORT -->
    <link rel="stylesheet" href="../dist/css/fonts.css">
    <link rel="stylesheet" href="../dist/css/layout.css">
    <link rel="stylesheet" href="../dist/css/forms.css">
    <link rel="stylesheet" href="../dist/css/helpers.css">
</head>
<body>

    <div class="cl-container u-p-2">
        <!-- Grid numerada de 12 colunas, com gutter via .g-3 -->
        <div class="cl-row u-g-3">
            <div class="cl-col-md-8 u-p-2">col-md-8</div>
            <div class="cl-col-md-4 u-p-2">col-md-4</div>
        </div>
        <div class="cl-row u-g-3 u-mt-3">
            <div class="cl-col-4 u-p-2">col-4</div>
            <div class="cl-col-4 u-p-2">col-4</div>
            <div class="cl-col-4 u-p-2">col-4</div>
        </div>

        <!-- Colunas de largura igual automática -->
        <div class="cl-row u-gx-2 u-mt-3">
            <div class="cl-col-sm u-p-2">col 1</div>
            <div class="cl-col-md u-p-2">col 2</div>
            <div class="cl-col u-p-2">col 3</div>
        </div>
        <div class="cl-row cl-row-fluid u-justify-content-start u-mt-3">
            <div class="cl-col cl-col-fluid u-p-2">col 1</div>
        </div>
    </div>

    <div class="cl-container-fluid u-p-2">
        <div class="cl-form-row u-mt-3 u-gap-x-2">
            <div class="cl-form-col">
                <label for="input-text" class="cl-form-label cl-form-size-md">Nome completo</label>
                <input type="text" class="cl-form-control cl-form-size-xxl" id="input-text" placeholder="Enter text" value="Jorge Reis">
                <span class="cl-form-text cl-form-size-xxl info">This is a valid text input field.</span>
            </div>
        </div>
        <div class="cl-form-row u-mt-3 u-gap-x-2">
            <div class="cl-form-col">
                <label for="input-readonly" class="cl-form-label cl-form-size-md">Somente leitura</label>
                <input type="text" class="cl-form-control cl-form-size-xxl" id="input-readonly" value="Valor fixo" readonly>
            </div>
        </div>
    </div>

    <div class="cl-container-fluid u-p-2 u-mt-3">
        <!-- Utilitários de tipografia -->
        <p class="u-text-center u-fw-medium u-fs-lg">Texto centralizado, peso medium, fonte lg</p>
        <p class="u-text-uppercase u-fs-sm">texto em uppercase, fonte sm</p>
        <p class="u-text-truncate" style="max-width: 200px;">Texto longo o suficiente para ser truncado com reticências</p>
        <p class="u-font-mono u-fs-md">Texto em fonte monoespaçada</p>
    </div>

</body>
</html>
