<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup - Layout</title>

    <!-- STYLES IMPORT -->
    <link rel="stylesheet" href="../dist/css/fonts.css">
    <link rel="stylesheet" href="../dist/css/layout.css">
    <link rel="stylesheet" href="../dist/css/forms.css">
    <link rel="stylesheet" href="../dist/css/helpers.css">
</head>
<body>

    <div class="container p-2">
        <!-- Grid numerada de 12 colunas, com gutter via .g-3 -->
        <div class="row g-3">
            <div class="col-md-8 p-2">col-md-8</div>
            <div class="col-md-4 p-2">col-md-4</div>
        </div>
        <div class="row g-3 mt-3">
            <div class="col-4 p-2">col-4</div>
            <div class="col-4 p-2">col-4</div>
            <div class="col-4 p-2">col-4</div>
        </div>

        <!-- Colunas de largura igual automática -->
        <div class="row gx-2 mt-3">
            <div class="col-sm p-2">col 1</div>
            <div class="col-md p-2">col 2</div>
            <div class="col p-2">col 3</div>
        </div>
        <div class="row row-fluid justify-content-start mt-3">
            <div class="col col-fluid p-2">col 1</div>
        </div>
    </div>

    <div class="container-fluid p-2">
        <div class="form-row mt-3 gap-x-2">
            <div class="form-col">
                <label for="input-text" class="form-label form-size-md">Nome completo</label>
                <input type="text" class="form-control form-size-xxl" id="input-text" placeholder="Enter text" value="Jorge Reis">
                <span class="form-text form-size-xxl info">This is a valid text input field.</span>
            </div>
        </div>
        <div class="form-row mt-3 gap-x-2">
            <div class="form-col">
                <label for="input-readonly" class="form-label form-size-md">Somente leitura</label>
                <input type="text" class="form-control form-size-xxl" id="input-readonly" value="Valor fixo" readonly>
            </div>
        </div>
    </div>

    <div class="container-fluid p-2 mt-3">
        <!-- Utilitários de tipografia -->
        <p class="text-center fw-medium fs-lg">Texto centralizado, peso medium, fonte lg</p>
        <p class="text-uppercase fs-sm">texto em uppercase, fonte sm</p>
        <p class="text-truncate" style="max-width: 200px;">Texto longo o suficiente para ser truncado com reticências</p>
        <p class="font-mono fs-md">Texto em fonte monoespaçada</p>
    </div>

</body>
</html>
