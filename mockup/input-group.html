<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup - Input Group</title>

    <!-- STYLES IMPORT -->
    <link rel="stylesheet" href="../dist/css/fonts.css">
    <link rel="stylesheet" href="../dist/css/forms.css">
    <link rel="stylesheet" href="../dist/css/components.css">
    <link rel="stylesheet" href="../dist/css/helpers.css">
    <style>
        .theme-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
            padding: 24px;
            background-color: var(--clarus-color-subtle);
        }

        [data-theme="dark"].theme-panel {
            color: var(--clarus-color-text);
            background-color: var(--clarus-color-surface);
        }

        .theme-panel > div {
            max-width: 360px;
        }
    </style>
</head>
<body>

    <h2 class="fs-lg fw-medium" style="padding: 24px 24px 0;">Claro</h2>
    <div class="theme-panel">
        <p class="fs-sm fw-medium mb-0">Sufixo</p>
        <div class="input-group">
            <input type="text" class="form-control" placeholder="usuario">
            <span class="input-group-text">@clarus.dev</span>
        </div>

        <p class="fs-sm fw-medium mb-0">Prefixo</p>
        <div class="input-group">
            <span class="input-group-text">R$</span>
            <input type="text" class="form-control" placeholder="0,00">
        </div>

        <p class="fs-sm fw-medium mb-0">Prefixo + sufixo, com botão</p>
        <div class="input-group">
            <span class="input-group-text">https://</span>
            <input type="text" class="form-control" placeholder="seusite.com">
            <button type="button" class="btn">Verificar</button>
        </div>

        <p class="fs-sm fw-medium mb-0">Tamanhos (sm / padrão / lg)</p>
        <div class="input-group input-group-sm">
            <span class="input-group-text">R$</span>
            <input type="text" class="form-control" placeholder="0,00">
        </div>
        <div class="input-group input-group-lg">
            <span class="input-group-text">R$</span>
            <input type="text" class="form-control" placeholder="0,00">
        </div>

        <p class="fs-sm fw-medium mb-0">Desabilitado</p>
        <div class="input-group">
            <span class="input-group-text">R$</span>
            <input type="text" class="form-control" placeholder="0,00" disabled>
        </div>
    </div>

    <h2 class="fs-lg fw-medium" data-theme="dark" style="padding: 24px 24px 0; background-color: var(--clarus-color-surface); color: var(--clarus-color-text); margin: 0;">Escuro</h2>
    <div class="theme-panel" data-theme="dark">
        <div class="input-group">
            <span class="input-group-text">R$</span>
            <input type="text" class="form-control" placeholder="0,00">
        </div>
        <div class="input-group">
            <input type="text" class="form-control" placeholder="seusite.com">
            <button type="button" class="btn">Verificar</button>
        </div>
    </div>

</body>
</html>
