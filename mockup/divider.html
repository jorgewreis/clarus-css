<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup - Divider</title>

    <!-- STYLES IMPORT -->
    <link rel="stylesheet" href="../dist/css/fonts.css">
    <link rel="stylesheet" href="../dist/css/components.css">
    <link rel="stylesheet" href="../dist/css/helpers.css">
    <style>
        .theme-panel {
            padding: 24px;
            background-color: var(--clarus-color-subtle);
        }

        [data-theme="dark"].theme-panel {
            color: var(--clarus-color-text);
            background-color: var(--clarus-color-surface);
        }

        .theme-panel {
            max-width: 360px;
        }
    </style>
</head>
<body>

    <h2 class="fs-lg fw-medium" style="padding: 24px 24px 0;">Claro</h2>
    <div class="theme-panel">
        <p class="mb-0">Texto acima do divisor simples.</p>
        <hr class="divider">
        <p class="mb-0">Texto abaixo.</p>

        <div class="divider"><span class="divider-label">ou</span></div>

        <p class="mb-0">Continue com e-mail e senha.</p>

        <div class="divider"><span class="divider-label">Seção 3</span></div>
    </div>

    <h2 class="fs-lg fw-medium" data-theme="dark" style="padding: 24px 24px 0; background-color: var(--clarus-color-surface); color: var(--clarus-color-text); margin: 0;">Escuro</h2>
    <div class="theme-panel" data-theme="dark">
        <p class="mb-0">Texto acima.</p>
        <hr class="divider">
        <div class="divider"><span class="divider-label">ou</span></div>
        <p class="mb-0">Texto abaixo.</p>
    </div>

</body>
</html>
