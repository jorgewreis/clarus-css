<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup - Notification Center</title>

    <!-- STYLES IMPORT -->
    <link rel="stylesheet" href="../dist/css/fonts.css">
    <link rel="stylesheet" href="../dist/css/components.css">
    <link rel="stylesheet" href="../dist/css/helpers.css">
    <style>
        .theme-panel {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 16px;
            min-height: 260px;
            padding: 24px;
        }

        [data-theme="dark"].theme-panel {
            color: var(--clarus-color-text);
            background-color: var(--clarus-color-surface);
        }

        .push-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
    </style>
</head>
<body>

    <div class="theme-panel">
        <h2 class="fs-lg fw-medium">Claro</h2>

        <button type="button" class="btn" data-clarus="notification-center" data-target="#panel-claro" id="bell-claro">
            Notificações
            <span class="notification-badge" hidden>0</span>
        </button>

        <div class="notification-center" id="panel-claro">
            <div class="notification-center-header">
                <span class="notification-center-title">Notificações</span>
                <button type="button" class="btn-close" data-notification="clear" aria-label="Limpar todas"></button>
            </div>
            <ul class="notification-list"></ul>
            <div class="notification-empty" hidden>Nenhuma notificação.</div>
        </div>

        <p class="fs-sm fw-medium mb-0">Disparar (empilha um toast + entra no histórico)</p>
        <div class="push-row">
            <button type="button" class="btn btn-success btn-sm" data-push="claro" data-variant="success">Sucesso</button>
            <button type="button" class="btn btn-danger btn-sm" data-push="claro" data-variant="danger">Erro</button>
            <button type="button" class="btn btn-info btn-sm" data-push="claro" data-variant="info">Info</button>
        </div>
    </div>

    <div class="theme-panel" data-theme="dark">
        <h2 class="fs-lg fw-medium">Escuro</h2>

        <button type="button" class="btn" data-clarus="notification-center" data-target="#panel-escuro" id="bell-escuro">
            Notificações
            <span class="notification-badge" hidden>0</span>
        </button>

        <div class="notification-center" id="panel-escuro">
            <div class="notification-center-header">
                <span class="notification-center-title">Notificações</span>
                <button type="button" class="btn-close" data-notification="clear" aria-label="Limpar todas"></button>
            </div>
            <ul class="notification-list"></ul>
            <div class="notification-empty" hidden>Nenhuma notificação.</div>
        </div>

        <div class="push-row">
            <button type="button" class="btn btn-success btn-sm" data-push="escuro" data-variant="success">Sucesso</button>
            <button type="button" class="btn btn-danger btn-sm" data-push="escuro" data-variant="danger">Erro</button>
        </div>
    </div>

    <div class="toast-container"></div>

    <!-- SCRIPTS IMPORT -->
    <script src="../dist/js/clarus.js"></script>
    <script>
        const messages = {
            success: { title: "Backup concluído", body: "Seus arquivos foram salvos." },
            danger: { title: "Falha no upload", body: "Tente novamente em instantes." },
            info: { title: "Nova versão disponível", body: "Recarregue para atualizar." },
        };

        document.querySelectorAll("[data-push]").forEach((button) => {
            button.addEventListener("click", () => {
                const bell = document.getElementById(`bell-${button.dataset.push}`);
                const center = Clarus.NotificationCenter.getInstance(bell);
                const variant = button.dataset.variant;
                center.push({ ...messages[variant], variant });
            });
        });
    </script>

</body>
</html>
