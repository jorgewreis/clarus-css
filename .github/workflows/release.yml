name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: npm

      - name: Verify tag matches package.json version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag $GITHUB_REF_NAME (versao $TAG_VERSION) nao bate com package.json (versao $PKG_VERSION)."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Types check
        run: npm run types:check

      - name: Contrast check (WCAG AA)
        run: npm run contrast:check

      - name: Size budgets
        run: npm run size:check

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Visual tests
        run: npm run test:visual

      - name: A11y tests (axe)
        run: npm run test:a11y

      - name: Publish clarus-css
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish clarus-icons
        run: npm publish --provenance --access public
        working-directory: packages/clarus-icons
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish clarus-cli
        run: npm publish --provenance --access public
        working-directory: packages/clarus-cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish clarus-react
        run: npm publish --provenance --access public
        working-directory: packages/clarus-react
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
